name: Build, Test and Deploy to Docker Hub

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install fastapi uvicorn pydantic requests cryptography reportlab psycopg2-binary python-dotenv docker prometheus_client opentelemetry-api opentelemetry-sdk opentelemetry-instrumentation-fastapi opentelemetry-exporter-otlp networkx clang

      - name: Run Unit Tests
        run: |
          python run_tests.py

  build-and-push:
    needs: test
    runs-on: ubuntu-22.04
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: anshvasant
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Sandbox Compiler Container
        uses: docker/build-push-action@v5
        with:
          context: ./services/sandbox-runtime
          file: ./services/sandbox-runtime/Dockerfile
          push: true
          tags: anshvasant/rocm-nav-sandbox:latest
