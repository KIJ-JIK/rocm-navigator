global:
  scrape_interval: 5s

scrape_configs:
  - job_name: "rocm-navigator"
    static_configs:
      # If the service runs on the host and Prometheus is in Docker,
      # host.docker.internal resolves the host. Adjust if your service
      # runs inside the same Docker network instead.
      - targets: ["host.docker.internal:8000"]
